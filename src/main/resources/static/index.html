<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪪 KTP Management</h1>
            <p>Sistem Manajemen Data Kependudukan</p>
        </header>

        <section class="form-section">
            <div class="card">
                <h2 id="form-title">Tambah Data KTP</h2>
                <form id="ktp-form">
                    <input type="hidden" id="ktp-id">
                    <div class="form-group">
                        <label for="nomorKtp">Nomor KTP</label>
                        <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit NIK" required>
                    </div>
                    <div class="form-group">
                        <label for="namaLengkap">Nama Lengkap</label>
                        <input type="text" id="namaLengkap" placeholder="Masukkan nama sesuai KTP" required>
                    </div>
                    <div class="form-group">
                        <label for="alamat">Alamat</label>
                        <textarea id="alamat" placeholder="Masukkan alamat lengkap" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tanggalLahir">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" required>
                        </div>
                        <div class="form-group">
                            <label for="jenisKelamin">Jenis Kelamin</label>
                            <select id="jenisKelamin" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="LAKI-LAKI">Laki-laki</option>
                                <option value="PEREMPUAN">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Simpan Data</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">Batal</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="table-section">
            <div class="card">
                <h2>Daftar Data KTP</h2>
                <div class="table-responsive">
                    <table id="ktp-table">
                        <thead>
                            <tr>
                                <th>NIK</th>
                                <th>Nama Lengkap</th>
                                <th>Alamat</th>
                                <th>Tanggal Lahir</th>
                                <th>Jenis Kelamin</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ktp-list">
                            <!-- Data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
